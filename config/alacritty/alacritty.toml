[window]
opacity = 0.85
decorations = "Full"
decorations_theme_variant = "Dark"

[window.padding]
x = 0
y = 0

[general]
import = [
"themes/miasma-default.toml",
]

[font]
size = 12.0

[font.normal]
family = "Source Code Pro"

[font.bold]
family = "Source Code Pro"

[font.italic]
family = "Source Code Pro"

[font.bold_italic]
family = "Source Code Pro"

[scrolling]
history = 10000
multiplier = 3

[keyboard]
bindings = [
  { key = "V", mods = "Control|Shift", action = "Paste" },
  { key = "C", mods = "Control|Shift", action = "Copy" },
  { key = "N", mods = "Control|Shift", action = "SpawnNewInstance" }
]

[env]
TERM = "xterm-256color"
